name: lrc_r
description: "Perceive your music."
publish_to: 'none'
version: 0.2.6+3

environment:
  sdk: ">=3.12.2 <4.0.0"
  flutter: "3.44.2"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Core
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.0

  # UI & Theming
  dynamic_color: ^1.7.0
  wakelock_plus: ^1.2.8
  confetti: ^0.8.0
  package_info_plus: ^10.1.0

  # File picking (audio + lyrics)
  file_picker: ^12.0.0-beta.5

  # Audio playback
  just_audio: ^0.10.2

  # Sharing / download
  share_plus: ^13.1.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0D0F14"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
