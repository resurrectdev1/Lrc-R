name: lrc_r
description: "Perceive your music."
publish_to: 'none'
version: 0.2.6+3

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: "3.41.2"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Core
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.0

  # UI & Theming
  dynamic_color: ^1.7.0
  wakelock_plus: ^1.2.8
  confetti: ^0.8.0
  package_info_plus: ^8.0.0

  # File picking (audio + lyrics)
  file_picker: ^8.1.2

  # Audio playback
  flutter_soloud: ^3.4.0

  # Sharing
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  path_provider_android: 2.2.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0D0F14"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
