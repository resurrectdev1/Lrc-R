    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: #080E18;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      #app-shell {
        min-height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
      }

      #flutter_host {
        width: 100%;
        height: 100vh;
        position: relative;
      }

      #flutter-loading {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #080E18;
        color: #E4EDF8;
        z-index: 2;
        transition: opacity 0.35s ease;
      }
      #flutter-loading img {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        opacity: 0.95;
      }
      #flutter-loading .spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 3px solid rgba(228, 237, 248, 0.15);
        border-top-color: #2261A1;
        animation: flutter-spin 0.9s linear infinite;
      }
      #flutter-loading .status {
        font-size: 13px;
        letter-spacing: 0.02em;
        color: rgba(228, 237, 248, 0.55);
      }
      @keyframes flutter-spin {
        to { transform: rotate(360deg); }
      }
      #flutter-loading.done {
        opacity: 0;
        pointer-events: none;
      }

      .desktop-aside { display: none; }

      @media (min-width: 900px) {
        #app-shell {
          flex-direction: row;
          gap: 72px;
          padding: 40px;
        }

        .phone-frame-wrap {
          position: relative;
          flex: none;
        }

        .phone-frame {
          width: 390px;
          height: 844px;
          flex: none;
          padding: 12px;
          border-radius: 56px;
          background: linear-gradient(155deg, #3f5878 0%, #263c56 30%, #16233a 65%, #0c1524 100%);
          box-shadow:
            0 50px 100px rgba(0, 0, 0, 0.6),
            0 0 0 1px rgba(228, 237, 248, 0.25) inset,
            0 1px 0 rgba(255, 255, 255, 0.25) inset;
          position: relative;
          z-index: 1;
        }

        .phone-frame .side-btn {
          position: absolute;
          right: -4px;
          width: 4px;
          background: linear-gradient(90deg, #4d6d92, #2c3f57);
          box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.4);
          border-radius: 3px;
        }
        .phone-frame .side-btn.vol-rocker {
          top: 150px;
          height: 90px;
        }
        .phone-frame .side-btn.power {
          top: 254px;
          height: 56px;
        }

        .phone-frame #flutter_host {
          width: 100%;
          height: 100%;
          border-radius: 46px;
          overflow: hidden;
          box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5);
          position: relative;
        }

        .phone-frame #flutter_host::after {
          content: "";
          position: absolute;
          inset: 0;
          pointer-events: none;
          background: linear-gradient(120deg, rgba(255, 255, 255, 0.10) 0%, rgba(255, 255, 255, 0) 26%);
          z-index: 5;
        }

        .desktop-aside {
          display: flex;
          flex-direction: column;
          gap: 18px;
          max-width: 340px;
          color: #E4EDF8;
        }
        .desktop-aside img.logo {
          width: 56px;
          height: 56px;
          border-radius: 14px;
        }
        .desktop-aside h1 {
          font-size: 28px;
          margin: 0;
          font-weight: 700;
        }
        .desktop-aside p {
          margin: 0;
          font-size: 15px;
          line-height: 1.5;
          color: rgba(228, 237, 248, 0.72);
        }
        .desktop-aside .qr-row {
          display: flex;
          align-items: center;
          gap: 14px;
          margin-top: 8px;
          padding: 14px;
          background: rgba(228, 237, 248, 0.05);
          border-radius: 16px;
        }
        .desktop-aside .qr-row img {
          width: 84px;
          height: 84px;
          border-radius: 8px;
        }
        .desktop-aside .qr-row span {
          font-size: 13px;
          color: rgba(228, 237, 248, 0.65);
          line-height: 1.4;
        }
        .desktop-aside a {
          color: #4C9DE0;
          text-decoration: none;
          font-weight: 600;
          font-size: 13px;
        }
        .desktop-aside a:hover { text-decoration: underline; }
      }
    </style>

<body>
    <div id="app-shell">
      <aside class="desktop-aside">
        <img class="logo" src="icons/Icon-192.png" alt="Lrc-R logo">
        <h1>Lrc-R</h1>
        <p>Lrc-R is designed for phone screens; you're viewing a live preview in a phone frame. For the full experience, scan the code to open it on your mobile device.</p>
        <div class="qr-row">
          <img src="qr-code.png" alt="QR code linking to this page">
          <span>Scan with your phone's camera to open this page on mobile.</span>
        </div>
        <a href="https://github.com/resurrectdev1/Lrc-R/releases/latest" target="_blank" rel="noopener">Get the Android app on GitHub →</a>
      </aside>

      <div class="phone-frame-wrap">
        <div class="phone-frame">
          <span class="side-btn vol-rocker"></span>
          <span class="side-btn power"></span>
          <div id="flutter_host">
            <div id="flutter-loading">
              <img src="icons/Icon-192.png" alt="Lrc-R">
              <div class="spinner"></div>
              <div class="status" id="flutter-loading-status">Loading Lrc-R…</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="flutter_bootstrap.js" async></script>
</body>
